name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Compile syntax check
        run: python -m compileall -q .

      - name: Import smoke test (without model)
        run: |
          python -c "
          import sys
          # Stubs mínimos para que el import de la app no requiera el modelo
          sys.modules.setdefault('uvicorn', None)
          from fastapi.testclient import TestClient
          import importlib, types
          # Skip lifespan (carga el modelo) — solo validamos que el módulo se importa
          import main as _
          assert hasattr(_, 'app')
          print('✓ FastAPI app imported successfully')
          "

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (without push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: ecoclasificador-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
