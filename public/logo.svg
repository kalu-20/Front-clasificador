<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Eco Clasificador">
  <defs>
    <style>
      .frame { fill: #FCF291; stroke: #7C1155; stroke-width: 4; }
      .leaf  { fill: #447A00; }
      .leaf-dark { fill: #355C00; }
      .wine  { fill: #7C1155; }
      .cream { fill: #FFF6C2; }
      .label { font-family: 'Alice', Georgia, serif; font-weight: 700; fill: #7C1155; }
    </style>
  </defs>

  <!-- Marco etiqueta -->
  <rect x="20" y="20" width="200" height="180" rx="36" ry="36" class="frame"/>

  <!-- Hojas decorativas exteriores (izq) -->
  <g class="leaf">
    <path d="M22,76 C8,72 4,58 8,46 C22,46 32,58 30,72 Z"/>
    <path class="leaf-dark" d="M14,58 C18,62 24,66 28,68" stroke="#355C00" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Hojas decorativas exteriores (der) -->
  <g class="leaf">
    <path d="M218,76 C232,72 236,58 232,46 C218,46 208,58 210,72 Z"/>
    <path class="leaf-dark" d="M226,58 C222,62 216,66 212,68" stroke="#355C00" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Símbolo central: flechas de reciclaje formando triángulo -->
  <g transform="translate(120 95)">
    <!-- flecha superior -->
    <path class="leaf" d="M-8,-30 L8,-30 L16,-16 L4,-16 L4,-6 L-4,-6 L-4,-16 L-16,-16 Z"/>
    <!-- flecha inferior izquierda -->
    <g transform="rotate(120)">
      <path class="leaf" d="M-8,-30 L8,-30 L16,-16 L4,-16 L4,-6 L-4,-6 L-4,-16 L-16,-16 Z"/>
    </g>
    <!-- flecha inferior derecha -->
    <g transform="rotate(240)">
      <path class="leaf" d="M-8,-30 L8,-30 L16,-16 L4,-16 L4,-6 L-4,-6 L-4,-16 L-16,-16 Z"/>
    </g>
    <!-- centro -->
    <circle r="6" class="cream" stroke="#7C1155" stroke-width="2"/>
  </g>

  <!-- Texto ECO -->
  <text x="120" y="158" class="label" font-size="22" letter-spacing="3" text-anchor="middle">ECO</text>
  <!-- Texto CLASIFICADOR -->
  <text x="120" y="184" class="label" font-size="14" letter-spacing="4" text-anchor="middle">CLASIFICADOR</text>

  <!-- Hojitas debajo del marco -->
  <g class="leaf">
    <path d="M84,212 C78,206 70,206 64,212 C70,222 80,222 84,212 Z"/>
    <path d="M156,212 C162,206 170,206 176,212 C170,222 160,222 156,212 Z"/>
    <ellipse cx="120" cy="212" rx="8" ry="6"/>
  </g>
</svg>
