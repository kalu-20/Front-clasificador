<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" width="460" height="460">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff8d6"/>
      <stop offset="100%" stop-color="#dce8b3"/>
    </radialGradient>
    <style>
      .skin   { fill: #f3c9a5; }
      .sweater{ fill: #e85a2a; }
      .shirt  { fill: #ffffff; }
      .pant   { fill: #a98759; }
      .hair   { fill: #5c3a1d; }
      .glass  { fill: #cfe6cf; opacity: .85; }
      .glass-dark { fill: #2c7a45; opacity: .85; }
      .leaf   { fill: #447A00; }
      .stem   { fill: #355c00; }
      .pot    { fill: #b97f4b; }
      .label  { fill: #7C1155; font-family: Georgia, serif; font-weight: 700; font-size: 14px; }
    </style>
  </defs>

  <!-- fondo circular -->
  <circle cx="230" cy="230" r="225" fill="url(#bg)"/>

  <!-- planta colgante izquierda -->
  <g transform="translate(60 60)">
    <path class="stem" d="M20 0 q-10 30 -16 70 q-6 40 8 80 q10 20 -10 30" stroke="#355c00" stroke-width="2" fill="none"/>
    <ellipse class="leaf" cx="6" cy="32" rx="14" ry="6" transform="rotate(-30 6 32)"/>
    <ellipse class="leaf" cx="36" cy="60" rx="14" ry="6" transform="rotate(20 36 60)"/>
    <ellipse class="leaf" cx="4" cy="88" rx="16" ry="7" transform="rotate(-40 4 88)"/>
    <ellipse class="leaf" cx="40" cy="118" rx="16" ry="7" transform="rotate(30 40 118)"/>
    <ellipse class="leaf" cx="2" cy="148" rx="14" ry="6" transform="rotate(-25 2 148)"/>
  </g>

  <!-- cuadros decorativos -->
  <rect x="340" y="80" width="46" height="58" fill="#fff" stroke="#7C1155" stroke-width="2"/>
  <path class="leaf" d="M352 100 q11 -10 22 0 q-11 18 -22 0 z"/>
  <rect x="395" y="80" width="46" height="58" fill="#fff" stroke="#7C1155" stroke-width="2"/>
  <ellipse class="leaf" cx="418" cy="110" rx="14" ry="6"/>

  <!-- figura central: persona con botella -->
  <g transform="translate(150 110)">
    <!-- pelo -->
    <ellipse class="hair" cx="80" cy="40" rx="36" ry="34"/>
    <path class="hair" d="M50 60 q-6 60 -14 110 q22 -6 32 -18 z"/>
    <!-- cara -->
    <ellipse class="skin" cx="80" cy="52" rx="28" ry="32"/>
    <!-- ojos / sonrisa -->
    <path d="M70 50 q4 -4 8 0" stroke="#3d271a" stroke-width="2" fill="none"/>
    <path d="M86 50 q4 -4 8 0" stroke="#3d271a" stroke-width="2" fill="none"/>
    <path d="M74 66 q6 6 12 0" stroke="#3d271a" stroke-width="2" fill="none"/>
    <!-- cuello -->
    <rect class="skin" x="72" y="82" width="16" height="14"/>
    <!-- camiseta blanca -->
    <path class="shirt" d="M40 96 q40 -8 80 0 v60 q-40 8 -80 0 z"/>
    <!-- sweater naranja a los lados -->
    <path class="sweater" d="M30 96 q-6 30 0 80 q14 6 22 4 v-80 q-12 -6 -22 -4 z"/>
    <path class="sweater" d="M130 96 q6 30 0 80 q-14 6 -22 4 v-80 q12 -6 22 -4 z"/>
    <!-- pantalón -->
    <path class="pant" d="M40 156 q40 8 80 0 v40 h-80 z"/>

    <!-- brazos sosteniendo botellas -->
    <path class="skin" d="M30 130 q-18 14 -16 38 q4 14 18 6 q4 -10 6 -22 z"/>
    <path class="skin" d="M130 130 q18 14 16 38 q-4 14 -18 6 q-4 -10 -6 -22 z"/>

    <!-- botella izquierda (vidrio claro) -->
    <g transform="translate(0 150)">
      <rect class="glass" x="0" y="-6" width="14" height="6"/>
      <path class="glass" d="M-2 0 q-4 6 -4 12 v34 q0 8 10 8 h10 q10 0 10 -8 v-34 q0 -6 -4 -12 z"/>
    </g>

    <!-- botella derecha (vidrio claro) -->
    <g transform="translate(146 150)">
      <rect class="glass" x="0" y="-6" width="14" height="6"/>
      <path class="glass" d="M-2 0 q-4 6 -4 12 v34 q0 8 10 8 h10 q10 0 10 -8 v-34 q0 -6 -4 -12 z"/>
    </g>
  </g>

  <!-- botellas de fondo (mesa) -->
  <g transform="translate(150 340)">
    <!-- botella verde grande -->
    <path class="glass-dark" d="M55 0 v-30 q0 -8 6 -10 v-12 h12 v12 q6 2 6 10 v30 z"/>
    <path class="glass-dark" d="M50 0 h36 v54 q0 8 -8 8 h-20 q-8 0 -8 -8 z"/>
    <!-- botellas plásticas pequeñas -->
    <path class="glass" d="M10 10 v-20 q0 -6 4 -8 v-8 h8 v8 q4 2 4 8 v20 z"/>
    <path class="glass" d="M6 10 h28 v40 q0 8 -8 8 h-12 q-8 0 -8 -8 z"/>

    <path class="glass" d="M110 10 v-20 q0 -6 4 -8 v-8 h8 v8 q4 2 4 8 v20 z"/>
    <path class="glass" d="M106 10 h28 v40 q0 8 -8 8 h-12 q-8 0 -8 -8 z"/>
  </g>
</svg>
