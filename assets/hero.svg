<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" width="460" height="460" role="img" aria-label="Reciclaje hero">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FFF8D6"/>
      <stop offset="100%" stop-color="#DCE8B3"/>
    </radialGradient>
    <style>
      .leaf      { fill: #447A00; }
      .leaf-dark { fill: #355C00; }
      .wine      { fill: #7C1155; }
      .yellow    { fill: #FCF291; }
      .cream     { fill: #FFF6C2; }
      .label     { fill: #7C1155; font-family: 'Alice', Georgia, serif; font-weight: 700; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Fondo circular -->
  <circle cx="230" cy="230" r="220" fill="url(#bg)"/>
  <circle cx="230" cy="230" r="200" fill="none" stroke="#7C1155" stroke-opacity="0.12" stroke-dasharray="3 6"/>
  <circle cx="230" cy="230" r="160" fill="none" stroke="#447A00" stroke-opacity="0.18" stroke-dasharray="2 8"/>

  <!-- Hojas decorativas esquina superior izquierda -->
  <g transform="translate(70 70)">
    <path class="leaf"      d="M0,0 C-12,8 -16,28 -8,44 C8,40 18,24 14,8 C10,2 6,0 0,0 Z"/>
    <path class="leaf-dark" d="M-2,8 C0,18 4,28 8,36" stroke="#355C00" stroke-width="1.5" fill="none"/>
    <path class="leaf"      d="M30,-10 C26,2 30,18 42,22 C50,12 50,-4 42,-12 C36,-14 32,-12 30,-10 Z"/>
  </g>

  <!-- Hojas decorativas esquina superior derecha -->
  <g transform="translate(390 70) scale(-1 1)">
    <path class="leaf"      d="M0,0 C-12,8 -16,28 -8,44 C8,40 18,24 14,8 C10,2 6,0 0,0 Z"/>
    <path class="leaf-dark" d="M-2,8 C0,18 4,28 8,36" stroke="#355C00" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Símbolo central: planeta + flechas reciclaje -->
  <g transform="translate(230 230)">
    <!-- planeta -->
    <circle r="80" fill="#FFF6C2" stroke="#7C1155" stroke-width="3"/>
    <!-- continentes estilizados -->
    <path class="leaf" d="M-40,-20 C-50,-10 -40,10 -20,12 C-10,4 -14,-12 -28,-22 C-34,-24 -38,-22 -40,-20 Z"/>
    <path class="leaf" d="M20,-30 C10,-20 14,-4 28,-2 C40,-8 38,-24 28,-32 C24,-34 22,-32 20,-30 Z"/>
    <path class="leaf" d="M-10,20 C-20,30 -10,50 10,48 C24,40 20,22 4,16 C-2,14 -6,16 -10,20 Z"/>

    <!-- Flechas de reciclaje rodeando -->
    <g class="wine" opacity="0.9">
      <!-- arriba -->
      <path d="M-14,-104 L0,-92 L14,-104 L8,-104 L8,-114 L-8,-114 L-8,-104 Z"/>
      <!-- abajo izq -->
      <g transform="rotate(120)">
        <path d="M-14,-104 L0,-92 L14,-104 L8,-104 L8,-114 L-8,-114 L-8,-104 Z"/>
      </g>
      <!-- abajo der -->
      <g transform="rotate(240)">
        <path d="M-14,-104 L0,-92 L14,-104 L8,-104 L8,-114 L-8,-114 L-8,-104 Z"/>
      </g>
    </g>
  </g>

  <!-- Botella de vidrio (abajo izquierda) -->
  <g transform="translate(80 340)">
    <rect x="-6" y="-30" width="20" height="6" class="leaf-dark"/>
    <path class="leaf" d="M-10,-24 Q-14,-18 -14,-10 V60 Q-14,72 -2,72 H18 Q30,72 30,60 V-10 Q30,-18 26,-24 Z" opacity="0.85"/>
    <rect x="-6" y="10" width="22" height="18" rx="2" class="cream" opacity="0.5"/>
  </g>

  <!-- Botella plástica (abajo derecha) -->
  <g transform="translate(360 350)">
    <rect x="-4" y="-26" width="14" height="5" class="wine"/>
    <path class="cream" stroke="#7C1155" stroke-width="2" d="M-8,-22 Q-10,-16 -10,-10 V52 Q-10,62 0,62 H14 Q24,62 24,52 V-10 Q24,-16 22,-22 Z"/>
    <rect x="-6" y="6" width="22" height="12" rx="2" class="yellow"/>
  </g>

  <!-- Caja de cartón (abajo centro) -->
  <g transform="translate(200 360)">
    <rect width="60" height="50" rx="3" fill="#B97F4B" stroke="#7C1155" stroke-width="2"/>
    <path d="M0,12 L60,12" stroke="#7C1155" stroke-width="2" opacity="0.5"/>
    <text x="30" y="36" class="label" text-anchor="middle">ECO</text>
  </g>

  <!-- Etiqueta inferior -->
  <text x="230" y="438" class="label" text-anchor="middle">Clasificá · Aprendé · Reciclá</text>
</svg>
